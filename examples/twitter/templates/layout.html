<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Twitter Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 275px 1fr 350px;
            gap: 20px;
            min-height: 100vh;
        }
        
        .sidebar {
            padding: 20px;
            border-right: 1px solid #2f3336;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        
        .main-content {
            padding: 20px;
            border-right: 1px solid #2f3336;
        }
        
        .right-sidebar {
            padding: 20px;
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #1d9bf0;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 15px;
        }
        
        .nav-menu a {
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            padding: 12px 20px;
            border-radius: 25px;
            display: block;
            transition: background-color 0.2s;
        }
        
        .nav-menu a:hover {
            background-color: #1a1a1a;
        }
        
        .btn {
            background-color: #1d9bf0;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s;
        }
        
        .btn:hover {
            background-color: #1a8cd8;
        }
        
        .btn-secondary {
            background-color: transparent;
            border: 1px solid #536471;
            color: #fff;
        }
        
        .btn-secondary:hover {
            background-color: #1a1a1a;
        }
        
        .post-form {
            background-color: #16181c;
            border: 1px solid #2f3336;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .post-form textarea {
            width: 100%;
            background-color: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            resize: none;
            min-height: 100px;
            outline: none;
        }
        
        .post-form textarea::placeholder {
            color: #536471;
        }
        
        .post {
            background-color: #16181c;
            border: 1px solid #2f3336;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .post-author {
            font-weight: bold;
            margin-right: 8px;
        }
        
        .post-username {
            color: #536471;
            margin-right: 8px;
        }
        
        .post-time {
            color: #536471;
            font-size: 14px;
        }
        
        .post-content {
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .post-actions {
            display: flex;
            gap: 20px;
        }
        
        .post-action {
            color: #536471;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 15px;
            transition: background-color 0.2s;
        }
        
        .post-action:hover {
            background-color: #1a1a1a;
        }
        
        .post-action.liked {
            color: #f91880;
        }
        
        .widget {
            background-color: #16181c;
            border: 1px solid #2f3336;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .widget-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .recommendation {
            padding: 12px 0;
            border-bottom: 1px solid #2f3336;
        }
        
        .recommendation:last-child {
            border-bottom: none;
        }
        
        .recommendation-user {
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .recommendation-reason {
            color: #536471;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #16181c;
            border: 1px solid #2f3336;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #1d9bf0;
        }
        
        .comment {
            background-color: #0d1117;
            border: 1px solid #2f3336;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .comment-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .comment-author {
            font-weight: bold;
            margin-right: 8px;
        }
        
        .comment-time {
            color: #536471;
            font-size: 14px;
        }
        
        .comment-content {
            font-size: 14px;
        }
        
        .user-profile {
            text-align: center;
            padding: 20px;
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .profile-username {
            color: #536471;
            margin-bottom: 10px;
        }
        
        .profile-bio {
            margin-bottom: 15px;
        }
        
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .profile-stat {
            text-align: center;
        }
        
        .profile-stat-number {
            font-weight: bold;
            font-size: 18px;
        }
        
        .profile-stat-label {
            color: #536471;
            font-size: 14px;
        }
        
        .error {
            background-color: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .sidebar, .right-sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    {{ content|safe }}
</body>
</html>
